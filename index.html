<style>
:root{
  --paper:#F6F4EE; --card:#FFFFFF; --ink:#1E2A32; --muted:#6B7A85;
  --teal:#0E7C7B; --teal-d:#0A5A59; --gold:#E0A426; --coral:#E4572E;

}
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&family=Frank+Ruhl+Libre:wght@700;900&display=swap');
*{box-sizing:border-box; margin:0}
body{min-height:100vh; background:var(--paper); color:var(--ink); font-family:Heebo,system-ui,sans-serif;
  background-image:radial-gradient(circle at 12% 8%, #0E7C7B0F 0, transparent 40%),radial-gradient(circle at 90% 92%, #E0A4261A 0, transparent 35%);}

.track-you span{font-size:11px; font-weight:900; color:var(--coral); background:#fff; border:1px solid var(--coral);
  border-radius:20px; padding:2px 8px; white-space:nowrap}
.track-labels{display:flex; justify-content:space-between; position:absolute; top:44px; width:100%; font-size:11.5px; color:var(--muted)}
.chips{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px}
.chip{border-radius:14px; padding:12px 14px; border:1.5px solid var(--line); background:#fff}
.chip b{display:block; font-size:15px}
.chip span{font-size:12.5px; color:var(--muted)}
.chip.done{background:#EDF7EE; border-color:#9CCBA2}
.chip.soon{background:#FDEEE7; border-color:#F0B49E}
.chip.future{background:var(--soft); border-color:#A9CFCB}
.board-title{font-size:24px; margin-bottom:14px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px}
.friend{text-align:right; background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:14px; cursor:pointer; font-family:Heebo; transition:transform .15s, box-shadow .15s; width:100%}
.friend:hover{transform:translateY(-2px); box-shadow:0 6px 16px #1e2a3212}

.empty{text-align:center; margin-top:14px; display:flex; flex-direction:column; gap:10px; align-items:center}
.note-input{display:flex; gap:8px; margin:10px 0 16px}
.note{border-top:1px solid var(--line); padding:10px 0}
.note b{font-size:13.5px; color:var(--teal-d)}
.note p{font-size:14.5px; margin:2px 0}
.note small{color:var(--muted); font-size:11.5px}
.setup{max-width:640px; margin:60px auto; line-height:1.8}
.setup code{background:var(--soft); padding:2px 6px; border-radius:6px; font-size:13px}

@media (prefers-reduced-motion: reduce){ *{transition:none!important} }

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ─── מאגר התמחויות (הר"י) ─── */
const SPECIALTIES = [
  ["אונקולוגיה", 46], ["ביוכימיה קלינית", 89], ["בריאות הציבור", 88],
  ["גריאטריה", 42], ["הרדמה", 47], ["יילוד וגינקולוגיה", 20],
  ["כירורגיה אורולוגית", 41], ["כירורגיה אורתופדית", 75], ["כירורגיה כללית", 70],
  ["כירורגיה פלסטית ואסתטית", 73], ["כירורגיה של בית החזה", 72],
  ["כירורגית ילדים", 74], ["כירורגית כלי-דם", 85],
  ["מחלות א.א.ג וכירורגיה של ראש וצוואר", 44], ["מחלות עור ומין", 4],
  ["מחלות עיניים", 78], ["מיקרוביולוגיה קלינית", 91], ["נוירוכירורגיה", 76],
  ["נוירולוגיה", 60], ["פסיכיאטריה", 50], ["פסיכיאטריה של הילד ומתבגר", 51],
  ["פתולוגיה אבחנתית", 32], ["רדיולוגיה אבחנתית", 48], ["רפואה גרעינית", 84],
  ["רפואה דחופה", 293], ["רפואה משפטית", 95], ["רפואה פיזיקלית ושיקום", 43],
  ["רפואה פנימית", 1], ["רפואה תעסוקתית", 39], ["רפואת ילדים", 10],
  ["רפואת משפחה", 99],
];
const syllabusUrl = (id) => `https://www.ima.org.il/internship/Syllabus.aspx?SpId=${id}`;

/* ─── עזרי זמן ─── */
const DAY = 86400000;
const parseD = (s) => (s ? new Date(s + "T00:00:00") : null);
const fmtDate = (s) => {
  const d = parseD(s);
  return d ? d.toLocaleDateString("he-IL", { day: "numeric", month: "long", year: "numeric" }) : "";
};
function diffYMD(from, to) {
  if (to <= from) return { y: 0, m: 0, d: 0 };
  let y = to.getFullYear() - from.getFullYear();
  let m = to.getMonth() - from.getMonth();
  let d = to.getDate() - from.getDate();
  if (d < 0) { m -= 1; d += new Date(to.getFullYear(), to.getMonth(), 0).getDate(); }
  if (m < 0) { y -= 1; m += 12; }
  return { y, m, d };
}
const heYMD = ({ y, m, d }) => {
  const parts = [];
  if (y) parts.push(y === 1 ? "שנה" : `${y} שנים`);
  if (m) parts.push(m === 1 ? "חודש" : `${m} חודשים`);
  parts.push(d === 1 ? "יום אחד" : `${d} ימים`);
  return parts.join(" · ");
};
const daysBetween = (a, b) => Math.ceil((b - a) / DAY);

/* ─── שכבת נתונים: Firestore ─── */
function subscribeResidents(cb) {
  return db.collection("residents").onSnapshot(
    (snap) => cb(snap.docs.map((d) => ({ id: d.id, ...d.data() }))),
    (err) => { console.error(err); cb([]); }
  );
}
async function saveResident(p) {
  const { id, ...data } = p;
  await db.collection("residents").doc(id).set(data, { merge: true });
}
function subscribeNotes(residentId, cb) {
  return db.collection("residents").doc(residentId).collection("notes")
    .orderBy("ts", "desc").limit(100)
    .onSnapshot((snap) => cb(snap.docs.map((d) => d.data())), (e) => { console.error(e); cb([]); });
}
async function addNoteDoc(residentId, note) {
  await db.collection("residents").doc(residentId).collection("notes").add(note);
}

/* ─── רכיבי UI ─── */
function Avatar({ p, big }) {
  return (
    <span className={"avatar" + (big ? " big" : "")}>
      {p.photo ? <img src={p.photo} alt="" referrerPolicy="no-referrer" /> : (p.name || "?").trim()[0]}
    </span>
  );
}

function Ring({ pct, size = 210, done }) {
  const r = size / 2 - 14;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.min(pct, 100) / 100);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block" }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--line)" strokeWidth="12" />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none"
        stroke={done ? "var(--gold)" : "var(--teal)"} strokeWidth="12" strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={off}
        transform={`rotate(-90 ${size / 2} ${size / 2})`}
        style={{ transition: "stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1)" }} />
      <text x="50%" y="46%" textAnchor="middle" style={{ font: "700 44px Heebo, sans-serif", fill: "var(--ink)" }}>
        {pct.toFixed(1)}%
      </text>
      <text x="50%" y="60%" textAnchor="middle" style={{ font: "500 14px Heebo, sans-serif", fill: "var(--muted)" }}>
        {done ? "הושלם 🎉" : "מההתמחות בוצע"}
      </text>
    </svg>
  );
}

function StageChip({ label, stage }) {
  if (!stage || stage.status === "unknown")
    return <div className="chip unknown"><b>{label}</b><span>עוד לא ידוע</span></div>;
  const d = parseD(stage.date);
  const now = new Date();
  if (stage.status === "done")
    return <div className="chip done"><b>{label} ✓</b><span>עבר{stage.date ? ` · ${fmtDate(stage.date)}` : ""}</span></div>;
  if (!d) return <div className="chip unknown"><b>{label}</b><span>מתוכנן, תאריך לא נקבע</span></div>;
  const days = daysBetween(now, d);
  return (
    <div className={"chip " + (days <= 60 ? "soon" : "future")}>
      <b>{label}</b>
      <span>{days > 0 ? `בעוד ${days} ימים · ${fmtDate(stage.date)}` : `היום! ${fmtDate(stage.date)}`}</span>
    </div>
  );
}

function Track({ p }) {
  const s = parseD(p.startDate), e = parseD(p.endDate);
  if (!s || !e || e <= s) return null;
  const now = new Date();
  const pos = (d) => Math.min(100, Math.max(0, ((d - s) / (e - s)) * 100));
  const marks = [];
  const add = (stage, label) => {
    if (stage?.date) marks.push({ x: pos(parseD(stage.date)), label, done: stage.status === "done" || parseD(stage.date) < now });
  };
  add(p.stageA, "שלב א׳");
  add(p.stageB, "שלב ב׳");
  const cur = pos(now);
  return (
    <div className="track" dir="ltr">
      <div className="track-line" />
      <div className="track-fill" style={{ width: `${cur}%` }} />
      <div className="track-dot start" style={{ left: 0 }} title="תחילת התמחות" />
      <div className="track-dot end" style={{ left: "100%" }} title="סיום" />
      {marks.map((m, i) => (
        <div key={i} className={"track-mark" + (m.done ? " done" : "")} style={{ left: `${m.x}%` }}>
          <span>{m.label}</span>
        </div>
      ))}
      <div className="track-you" style={{ left: `${cur}%` }}><span>אתם כאן</span></div>
      <div className="track-labels" dir="rtl">
        <span>{fmtDate(p.startDate)}</span>
        <span>{fmtDate(p.endDate)}</span>
      </div>
    </div>
  );
}

function StageForm({ label, value, onChange }) {
  const v = value || { status: "unknown", date: "" };
  return (
    <div className="stage-form">
      <label className="fl">{label}</label>
      <div className="seg">
        {[["unknown", "לא ידוע"], ["scheduled", "מתוכנן"], ["done", "עברתי"]].map(([k, t]) => (
          <button key={k} type="button" className={v.status === k ? "on" : ""}
            onClick={() => onChange({ ...v, status: k })}>{t}</button>
        ))}
      </div>
      {v.status !== "unknown" && (
        <input type="date" value={v.date || ""} onChange={(ev) => onChange({ ...v, date: ev.target.value })} />
      )}
    </div>
  );
}

function ProfileForm({ initial, onSave, saving }) {
  const [f, setF] = useState(initial);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const spId = SPECIALTIES.find(([n]) => n === f.specialty)?.[1];
  const valid = f.name?.trim() && f.specialty && f.startDate && f.endDate && parseD(f.endDate) > parseD(f.startDate);
  return (
    <div className="card form-card">
      <h2>{initial.startDate ? "עריכת פרופיל" : "בניית הפרופיל שלך"}</h2>
      <label className="fl">שם מלא</label>
      <input value={f.name || ""} onChange={(e) => set("name", e.target.value)} placeholder="ד״ר ..." />
      <label className="fl">התמחות</label>
      <select value={f.specialty || ""} onChange={(e) => set("specialty", e.target.value)}>
        <option value="" disabled>בחרו התמחות מהמאגר…</option>
        {SPECIALTIES.map(([n]) => <option key={n} value={n}>{n}</option>)}
      </select>
      {spId && <a className="syl" href={syllabusUrl(spId)} target="_blank" rel="noreferrer">📄 סילבוס ההתמחות באתר הר״י ←</a>}
      <div className="row2">
        <div>
          <label className="fl">תחילת התמחות</label>
          <input type="date" value={f.startDate || ""} onChange={(e) => set("startDate", e.target.value)} />
        </div>
        <div>
          <label className="fl">סיום התמחות (צפוי)</label>
          <input type="date" value={f.endDate || ""} onChange={(e) => set("endDate", e.target.value)} />
        </div>
      </div>
      {f.startDate && f.endDate && parseD(f.endDate) <= parseD(f.startDate) && (
        <div className="err">תאריך הסיום חייב להיות אחרי תאריך ההתחלה.</div>
      )}
      <StageForm label="בחינת שלב א׳" value={f.stageA} onChange={(v) => set("stageA", v)} />
      <StageForm label="בחינת שלב ב׳" value={f.stageB} onChange={(v) => set("stageB", v)} />
      <button className="btn primary" disabled={!valid || saving} onClick={() => onSave(f)}>
        {saving ? "שומר…" : "שמירה והצגה"}
      </button>
      <p className="tiny">🔓 הפרופיל וההערות גלויים לכל משתמשי האתר המחוברים — כך החברים רואים את ההתקדמות שלך.</p>
    </div>
  );
}

function FriendCard({ p, meId, onOpen }) {
  const now = new Date();
  const s = parseD(p.startDate), e = parseD(p.endDate);
  const pct = s && e ? Math.min(100, Math.max(0, ((now - s) / (e - s)) * 100)) : 0;
  const rem = e > now ? heYMD(diffYMD(now, e)) : "סיים/ה 🎓";
  return (
    <button className={"friend" + (p.id === meId ? " me" : "")} onClick={() => onOpen(p)}>
      <div className="f-top">
        <Avatar p={p} />
        <div className="f-names">
          <b>{p.name}{p.id === meId ? " (את/ה)" : ""}</b>
          <small>{p.specialty}</small>
        </div>
        <span className="f-pct">{pct.toFixed(0)}%</span>
      </div>
      <div className="bar"><div style={{ width: `${pct}%` }} /></div>
      <small className="f-rem">{e > now ? `נותרו ${rem}` : rem}</small>
    </button>
  );
}

function ProfileView({ p, me, onBack, onEdit }) {
  const [notes, setNotes] = useState(null);
  const [txt, setTxt] = useState("");
  const [now, setNow] = useState(new Date());
  useEffect(() => subscribeNotes(p.id, setNotes), [p.id]);
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);

  const s = parseD(p.startDate), e = parseD(p.endDate);
  if (!s || !e) return null;
  const done = now >= e;
  const pctDone = Math.min(100, Math.max(0, ((now - s) / (e - s)) * 100));
  const pctLeft = Math.max(0, 100 - pctDone);
  const remYMD = done ? null : diffYMD(now, e);
  const secLeft = Math.max(0, Math.floor((e - now) / 1000));
  const isMe = me && p.id === me.id;

  async function addNote() {
    if (!txt.trim() || !me) return;
    const note = { author: me.name, authorId: me.id, text: txt.trim(), ts: Date.now() };
    setTxt("");
    try { await addNoteDoc(p.id, note); } catch (err) { alert("שגיאה בשליחת ההערה"); }
  }

  return (
    <div className="profile">
      <div className="p-head">
        <button className="btn ghost" onClick={onBack}>→ חזרה ללוח</button>
        {isMe && <button className="btn ghost" onClick={onEdit}>✏️ עריכה</button>}
      </div>
      <div className="card hero">
        <div className="hero-right">
          <Avatar p={p} big />
          <h1>{p.name}</h1>
          <a className="spec" href={syllabusUrl(SPECIALTIES.find(([n]) => n === p.specialty)?.[1] || 1)} target="_blank" rel="noreferrer">{p.specialty}</a>
          <div className="counters">
            <div className="counter">
              <b>{done ? "0%" : pctLeft.toFixed(1) + "%"}</b><span>נותר מההתמחות</span>
            </div>
            <div className="counter">
              <b>{done ? "🎓" : heYMD(remYMD)}</b><span>{done ? "ההתמחות הושלמה" : "עד הסיום"}</span>
            </div>
            {!done && (
              <div className="counter live">
                <b>{secLeft.toLocaleString("he-IL")}</b><span>שניות עד הסיום ⏱</span>
              </div>
            )}
          </div>
        </div>
        <Ring pct={pctDone} done={done} />
      </div>

      <Track p={p} />

      <div className="chips">
        <StageChip label="שלב א׳" stage={p.stageA} />
        <StageChip label="שלב ב׳" stage={p.stageB} />
      </div>

      <div className="card">
        <h3>הערות ועידוד מחברים 💬</h3>
        {me && (
          <div className="note-input">
            <input value={txt} placeholder={isMe ? "כתבו הערה על עצמכם…" : `כתבו משהו ל${p.name}…`}
              onChange={(e2) => setTxt(e2.target.value)}
              onKeyDown={(e2) => e2.key === "Enter" && addNote()} />
            <button className="btn primary" onClick={addNote} disabled={!txt.trim()}>שליחה</button>
          </div>
        )}
        {notes === null ? <p className="tiny">טוען הערות…</p> :
          notes.length === 0 ? <p className="tiny">אין עדיין הערות — היו הראשונים לעודד!</p> :
            notes.map((n, i) => (
              <div className="note" key={i}>
                <b>{n.author}</b>
                <p>{n.text}</p>
                <small>{new Date(n.ts).toLocaleDateString("he-IL")}</small>
              </div>
            ))}
      </div>
    </div>
  );
}

function Login({ onGoogle, error }) {
  return (
    <div className="login">
      <div className="logo-mark">🩺</div>
      <h1>מסלול<span>·</span>התמחות</h1>
      <p className="sub">עוקבים יחד אחרי קצב ההתקדמות — אחוזים, זמן שנותר, שלב א׳ ושלב ב׳.</p>
      <div className="card form-card">
        <button className="gbtn" onClick={onGoogle}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.5l6.7-6.7C35.6 2.4 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.8 6.1C12.3 13.4 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.7-.2-3.3-.5-4.9H24v9.3h12.7c-.6 3-2.3 5.6-4.8 7.3l7.6 5.9c4.4-4.1 7-10.1 7-17.6z"/><path fill="#FBBC05" d="M10.4 28.7a14.5 14.5 0 0 1 0-9.4l-7.8-6.1a24 24 0 0 0 0 21.6l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.6l-7.6-5.9c-2.1 1.4-4.8 2.3-7.6 2.3-6.3 0-11.7-3.9-13.6-9.4l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
          כניסה עם Google
        </button>
        {error && <p className="tiny warn">{error}</p>}
        <p className="tiny">ההתחברות נעשית מול Google — האתר לא רואה את הסיסמה שלכם.</p>
      </div>
    </div>
  );
}

function SetupScreen() {
  return (
    <div className="setup card">
      <h2>⚙️ נשאר רק לחבר Firebase</h2>
      <p>האתר עלה בהצלחה, אבל עדיין לא הודבקו פרטי ה-Firebase. פתחו את <code>index.html</code> ובראש הקובץ החליפו את כל ה-<code>PASTE_HERE</code> בערכים מ-Firebase Console → Project settings → Your apps.</p>
    </div>
  );
}

function App() {
  const [me, setMe] = useState(undefined);
  const [residents, setResidents] = useState([]);
  const [view, setView] = useState({ page: "board" });
  const [saving, setSaving] = useState(false);
  const [loginErr, setLoginErr] = useState("");

  // מאזין לכל הפרופילים בזמן אמת
  useEffect(() => {
    if (!CONFIG_OK) return;
    return subscribeResidents(setResidents);
  }, []);

  // מצב התחברות
  useEffect(() => {
    if (!CONFIG_OK) return;
    return auth.onAuthStateChanged(async (u) => {
      if (!u) { setMe(null); return; }
      const ref = db.collection("residents").doc(u.uid);
      const snap = await ref.get();
      if (snap.exists) {
        const p = { id: u.uid, ...snap.data() };
        setMe(p);
        if (!p.startDate) setView({ page: "edit" });
      } else {
        const p = {
          id: u.uid, name: u.displayName || "", email: u.email || "", photo: u.photoURL || "",
          stageA: { status: "unknown" }, stageB: { status: "unknown" },
        };
        setMe(p);
        setView({ page: "edit" });
      }
    });
  }, []);

  async function googleLogin() {
    setLoginErr("");
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await auth.signInWithPopup(provider);
    } catch (e) {
      if (e.code === "auth/popup-blocked" || e.code === "auth/operation-not-supported-in-this-environment") {
        try { await auth.signInWithRedirect(provider); } catch (e2) { setLoginErr("ההתחברות נכשלה: " + e2.message); }
      } else if (e.code !== "auth/popup-closed-by-user") {
        setLoginErr("ההתחברות נכשלה: " + e.message);
      }
    }
  }

  async function handleSave(f) {
    setSaving(true);
    const p = { ...me, ...f };
    try {
      await saveResident(p);
      setMe(p);
      setView({ page: "profile", p });
    } catch (e) {
      alert("שגיאה בשמירה — בדקו את חוקי ה-Firestore.\n" + e.message);
    }
    setSaving(false);
  }

  const sorted = useMemo(() => {
    const now = new Date();
    return [...residents].filter((p) => p.startDate && p.endDate).sort((a, b) => {
      const pct = (p) => (now - parseD(p.startDate)) / (parseD(p.endDate) - parseD(p.startDate));
      return pct(b) - pct(a);
    });
  }, [residents]);

  if (!CONFIG_OK) return <div className="wrap"><SetupScreen /></div>;
  if (me === undefined) return <div className="wrap"><p className="tiny center">טוען…</p></div>;
  if (me === null) return <div className="wrap"><Login onGoogle={googleLogin} error={loginErr} /></div>;

  const liveP = view.p ? (residents.find((r) => r.id === view.p.id) || view.p) : null;

  return (
    <div className="wrap">
      <header className="top">
        <button className="brand" onClick={() => setView({ page: "board" })}>🩺 מסלול·התמחות</button>
        <div style={{ display: "flex", gap: 8 }}>
          {me.startDate && <button className="btn ghost" onClick={() => setView({ page: "profile", p: me })}>הפרופיל שלי</button>}
          <button className="btn ghost" onClick={() => auth.signOut()}>יציאה</button>
        </div>
      </header>

      {view.page === "edit" && <ProfileForm initial={me} onSave={handleSave} saving={saving} />}

      {view.page === "profile" && liveP && (
        <ProfileView p={liveP} me={me}
          onBack={() => setView({ page: "board" })}
          onEdit={() => setView({ page: "edit" })} />
      )}

      {view.page === "board" && (
        <div>
          <h2 className="board-title">לוח החברים — מי הכי מתקדם? 🏁</h2>
          {sorted.length === 0 ? (
            <div className="card empty">
              <p>עוד אין פרופילים בלוח.</p>
              {!me.startDate && <button className="btn primary" onClick={() => setView({ page: "edit" })}>בניית הפרופיל שלי</button>}
            </div>
          ) : (
            <div className="grid">
              {sorted.map((p) => (
                <FriendCard key={p.id} p={p} meId={me.id} onOpen={(pp) => setView({ page: "profile", p: pp })} />
              ))}
            </div>
          )}
          {!me.startDate && sorted.length > 0 && (
            <div className="card empty">
              <p>אתם עדיין לא בלוח.</p>
              <button className="btn primary" onClick={() => setView({ page: "edit" })}>בניית הפרופיל שלי</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
